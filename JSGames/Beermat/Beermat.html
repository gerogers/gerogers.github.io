<!DOCTYPE HTML>
<html lang="en">
<head>
<link rel="stylesheet" href="menubar.css">
<script>
function disable() {
    document.getElementById("SetStart").disabled=true;
}
function enable() {
    document.getElementById("SetStart").disabled=false;
}
</script>
</head>

<body>
  <div>
    <div class="topnav">
      <div class="dropdown">
        <button onclick="resets()" class="dropbtn">Reset</button>
        <div id="resetsDrop" class="dropdown-content">
          <a href="nowhere" onclick="resetW();return false;">Reset White</a>
          <a href="nowhere" onclick="resetB();return false;">Reset Black</a>
          <a href="nowhere" onclick="resetA();return false;">Reset All</a>
        </div>
      </div>
      <div class="dropdown">
        <button id="SetStart" onclick="starts();" class="dropbtn" color: white>Set Start</button>
        <div id="setStartDrop" class="dropdown-content">
          <a href="nowhere" onclick="firstW();return false;">First White</a>
          <a href="nowhere" onclick="secondW();return false;">Second White</a>
          <a href="nowhere" onclick="firstB();return false;">First Black</a>
          <a href="nowhere" onclick="secondB();return false;">Second Black</a>
        </div>
      </div>
      <div class="dropdown">
        <button onclick="helps();" class="dropbtn">Help</button>
        <div id="helpDrop" class="dropdown-content">
          <a href="nowhere" onclick="about();return false;">About</a>
          <a href="nowhere" onclick="instr();return false;">Instructions</a>
        </div>
      </div>
      <br>
    </div>
    <canvas id="beermat" width="320" height="320"
        onmouseDown="matDown(event)" onmouseUp="matUp(event)">
      Your browser does not support the canvas element.
    </canvas>
  </div>
  <script src="MazeCell.js" type="text/javascript"></script>
</body>
</html>
